name: ASP.NET Core CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  deploy:
    # Run only if build job succeeds
    needs: build

    # Use a fresh machine for deployment
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download the artifact created by CI
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: app-publish-output
        path: deploy-folder

    # Step 2: Simulate deployment
    - name: Simulate deployment
      run: |
        echo "Deploying application..."
        ls deploy-folder